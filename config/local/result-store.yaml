consumerName: "runtime-result-store"
ackWait: "30s"
retry:
  maxDeliver: 5
  backoff:
    - "2s"
    - "10s"
    - "30s"
serverless:
  url: "nats://nats.messaging.svc.cluster.local:4222"
  subjectPrefix: "runtime.serverless"
  streamName: "RUNTIME_SERVERLESS"
  streamReplicas: 1
  streamMaxAge: "72h"
  connectTimeout: "5s"
  duplicatesWindow: "24h"
  auth:
    tokenFile: ""
    credentialsFile: ""
  tls:
    enabled: false
    caFile: ""
    certFile: ""
    keyFile: ""
    serverName: ""
    insecureSkipVerify: false
  networkPolicyTarget:
    namespace: "messaging"
    podLabels:
      app.kubernetes.io/name: "nats"
scylla:
  hosts:
    - "scylla-client.runtime-data.svc.cluster.local:9042"
  keyspace: "runtime_serverless"
  resultsTable: "invocation_results"
  usernameFile: ""
  passwordFile: ""
  tls:
    enabled: false
    caFile: ""
    certFile: ""
    keyFile: ""
    serverName: ""
    insecureSkipVerify: false
  connectTimeout: "5s"
  requestTimeout: "5s"
  replicationFactor: 1
  autoMigrate: true
  maxInlineBodyBytes: 1048576
