httpAddr: ":8080"
reportInterval: "30s"
nvidiaMetricsEndpoint: ""
packages:
  - id: "gpu-rtx3080-2x-cpu10-mem40g"
    specName: "gpu.rtx3080.2x.10c.40g"
    cpu: "10"
    memory: "40Gi"
    gpu: 2
    allocation:
      deviceClassName: "nvidia-rtx-3080"
      claimRequestName: "gpu"
      count: 2
  - id: "gpu-hami-10g-50c-cpu4-mem16g"
    specName: "gpu.hami.10g.50c.4c.16g"
    cpu: "4"
    memory: "16Gi"
    gpu: 1
    virtualGPU:
      provider: "hami"
      memory: "10Gi"
      cores: 50
