# This rule is not used by the project gpu-operator-runtime itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the runtime.lokiwager.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-operator-runtime
    app.kubernetes.io/managed-by: kustomize
  name: stockpool-editor-role
rules:
- apiGroups:
  - runtime.lokiwager.io
  resources:
  - stockpools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - runtime.lokiwager.io
  resources:
  - stockpools/status
  verbs:
  - get
