consumerName: "runtime-activator"
metricsConsumerName: "runtime-activator-metrics"
workerReadyWait: "2m"
workerPollInterval: "2s"
lifecycleInterval: "15s"
maxPendingWorkersPerRequestID: 1
invocationRetry:
  maxDeliver: 5
  backoff:
    - "2s"
    - "10s"
    - "30s"
metricsRetry:
  maxDeliver: 5
  backoff:
    - "2s"
    - "10s"
    - "30s"
serverless:
  url: "nats://nats.messaging.svc.cluster.local:4222"
  subjectPrefix: "runtime.serverless"
  streamName: "RUNTIME_SERVERLESS"
  streamReplicas: 1
  streamMaxAge: "72h"
  connectTimeout: "5s"
  duplicatesWindow: "24h"
  auth:
    tokenFile: ""
    credentialsFile: ""
  tls:
    enabled: false
    caFile: ""
    certFile: ""
    keyFile: ""
    serverName: ""
    insecureSkipVerify: false
  networkPolicyTarget:
    namespace: "messaging"
    podLabels:
      app.kubernetes.io/name: "nats"
