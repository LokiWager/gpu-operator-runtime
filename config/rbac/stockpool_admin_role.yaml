# This rule is not used by the project gpu-operator-runtime itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over runtime.lokiwager.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-operator-runtime
    app.kubernetes.io/managed-by: kustomize
  name: stockpool-admin-role
rules:
- apiGroups:
  - runtime.lokiwager.io
  resources:
  - stockpools
  verbs:
  - '*'
- apiGroups:
  - runtime.lokiwager.io
  resources:
  - stockpools/status
  verbs:
  - get
