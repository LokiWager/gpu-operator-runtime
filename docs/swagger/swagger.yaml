basePath: /api/v1
definitions:
  api.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/api.APIError'
    type: object
  api.GPUUnitListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.GPUUnitRuntime'
        type: array
    type: object
  api.GPUUnitResponse:
    properties:
      data:
        $ref: '#/definitions/domain.GPUUnitRuntime'
    type: object
  api.HealthResponse:
    properties:
      data:
        $ref: '#/definitions/domain.HealthStatus'
    type: object
  api.OperatorJobResponse:
    properties:
      data:
        $ref: '#/definitions/domain.OperatorJob'
    type: object
  domain.GPUUnitRuntime:
    properties:
      access:
        $ref: '#/definitions/v1alpha1.GPUUnitAccess'
      accessURL:
        type: string
      gpu:
        type: integer
      image:
        type: string
      lastSyncTime:
        type: string
      lifecycle:
        type: string
      memory:
        type: string
      message:
        type: string
      name:
        type: string
      namespace:
        type: string
      observedGeneration:
        type: integer
      phase:
        type: string
      readyReplicas:
        type: integer
      reason:
        type: string
      serviceName:
        type: string
      sourceStockName:
        type: string
      sourceStockNamespace:
        type: string
      specName:
        type: string
      template:
        $ref: '#/definitions/v1alpha1.GPUUnitTemplate'
    type: object
  domain.HealthStatus:
    properties:
      activeUnitCount:
        type: integer
      kubeError:
        type: string
      kubernetesConnected:
        type: boolean
      nodeCount:
        type: integer
      startedAt:
        type: string
      stockUnitCount:
        type: integer
      uptimeSeconds:
        type: integer
    type: object
  domain.OperatorJob:
    properties:
      createdAt:
        type: string
      error:
        type: string
      id:
        type: string
      objectName:
        type: string
      objectNamespace:
        type: string
      operationID:
        type: string
      status:
        $ref: '#/definitions/domain.OperatorJobStatus'
      type:
        type: string
      updatedAt:
        type: string
    type: object
  domain.OperatorJobStatus:
    enum:
    - pending
    - running
    - succeeded
    - failed
    type: string
    x-enum-varnames:
    - OperatorJobPending
    - OperatorJobRunning
    - OperatorJobSucceeded
    - OperatorJobFailed
  service.CreateGPUUnitRequest:
    properties:
      access:
        $ref: '#/definitions/v1alpha1.GPUUnitAccess'
      image:
        type: string
      name:
        type: string
      namespace:
        type: string
      operationID:
        type: string
      specName:
        type: string
      stockNamespace:
        type: string
      template:
        $ref: '#/definitions/v1alpha1.GPUUnitTemplate'
    type: object
  service.CreateStockUnitsRequest:
    properties:
      gpu:
        type: integer
      memory:
        type: string
      operationID:
        type: string
      replicas:
        type: integer
      specName:
        type: string
    type: object
  service.UpdateGPUUnitRequest:
    properties:
      access:
        $ref: '#/definitions/v1alpha1.GPUUnitAccess'
      image:
        type: string
      template:
        $ref: '#/definitions/v1alpha1.GPUUnitTemplate'
    type: object
  v1.Protocol:
    enum:
    - TCP
    - UDP
    - SCTP
    type: string
    x-enum-varnames:
    - ProtocolTCP
    - ProtocolUDP
    - ProtocolSCTP
  v1alpha1.GPUUnitAccess:
    properties:
      primaryPort:
        type: string
      scheme:
        type: string
    type: object
  v1alpha1.GPUUnitEnvVar:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  v1alpha1.GPUUnitPortSpec:
    properties:
      name:
        type: string
      port:
        description: |-
          +kubebuilder:validation:Minimum=1
          +kubebuilder:validation:Maximum=65535
        type: integer
      protocol:
        $ref: '#/definitions/v1.Protocol'
    type: object
  v1alpha1.GPUUnitTemplate:
    properties:
      args:
        items:
          type: string
        type: array
      command:
        items:
          type: string
        type: array
      envs:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitEnvVar'
        type: array
      ports:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitPortSpec'
        type: array
    type: object
info:
  contact:
    name: API Support
  description: Control-plane API for the GPU operator runtime tutorial project.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: GPU Operator Runtime API
  version: "1.0"
paths:
  /gpu-units:
    get:
      description: List active GPU unit resources that were created by consuming stock
        units.
      parameters:
      - description: Namespace filter
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List GPU units
      tags:
      - runtime
    post:
      consumes:
      - application/json
      description: Consume one ready stock unit, keep its reserved resource envelope,
        and persist an active GPUUnit with the caller's runtime image, template, and
        access settings. Replays with the same operationID and payload are idempotent.
      parameters:
      - description: Create GPU unit request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.CreateGPUUnitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create a GPU unit
      tags:
      - runtime
  /gpu-units/{name}:
    delete:
      description: Delete an active GPU unit resource and let Kubernetes garbage collection
        clean up the owned runtime objects.
      parameters:
      - description: GPU unit name
        in: path
        name: name
        required: true
        type: string
      - description: Namespace filter
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Delete a GPU unit
      tags:
      - runtime
    get:
      description: Get the current desired and observed state of one active GPU unit.
      parameters:
      - description: GPU unit name
        in: path
        name: name
        required: true
        type: string
      - description: Namespace filter
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get a GPU unit
      tags:
      - runtime
    put:
      consumes:
      - application/json
      description: Update the mutable runtime contract of an active GPU unit, including
        image, template, and access settings.
      parameters:
      - description: GPU unit name
        in: path
        name: name
        required: true
        type: string
      - description: Namespace filter
        in: query
        name: namespace
        type: string
      - description: Update GPU unit request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateGPUUnitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update a GPU unit
      tags:
      - runtime
  /health:
    get:
      description: Return process and Kubernetes connectivity health for the runtime
        server.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Health check
      tags:
      - system
  /operator/jobs/{operationID}:
    get:
      description: Get the current state of an asynchronous stock seeding operation.
      parameters:
      - description: Operation ID
        in: path
        name: operationID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OperatorJobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get operation status
      tags:
      - operator
  /operator/stock-units:
    post:
      consumes:
      - application/json
      description: Submit an operator request that creates stock GPUUnit objects in
        the stock namespace using the built-in reservation image. Replays with the
        same operationID and payload are idempotent.
      parameters:
      - description: Create stock units request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.CreateStockUnitsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OperatorJobResponse'
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.OperatorJobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Seed stock units
      tags:
      - operator
schemes:
- http
swagger: "2.0"
