apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: gpu-operator-runtime
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: gpu-operator-runtime
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: gpu-operator-runtime
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: controller-manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: gpu-operator-runtime
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /controller-manager
        args:
        - --config=/etc/gpu-operator-runtime/controller-manager.yaml
        image: controller:latest
        name: controller-manager
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - name: controller-manager-config
          mountPath: /etc/gpu-operator-runtime
          readOnly: true
      volumes:
      - name: controller-manager-config
        configMap:
          name: controller-manager-config
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-api
  namespace: system
  labels:
    control-plane: runtime-api
    app.kubernetes.io/name: gpu-operator-runtime
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: runtime-api
      app.kubernetes.io/name: gpu-operator-runtime
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: runtime-api
      labels:
        control-plane: runtime-api
        app.kubernetes.io/name: gpu-operator-runtime
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /runtime-api
        args:
        - --config=/etc/gpu-operator-runtime/runtime-api.yaml
        image: controller:latest
        name: runtime-api
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - name: runtime-api-config
          mountPath: /etc/gpu-operator-runtime
          readOnly: true
      volumes:
      - name: runtime-api-config
        configMap:
          name: runtime-api-config
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
