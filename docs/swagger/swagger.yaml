basePath: /api/v1
definitions:
  api.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/api.APIError'
    type: object
  api.GPUStorageListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.GPUStorageRuntime'
        type: array
    type: object
  api.GPUStorageResponse:
    properties:
      data:
        $ref: '#/definitions/domain.GPUStorageRuntime'
    type: object
  api.GPUUnitListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.GPUUnitRuntime'
        type: array
    type: object
  api.GPUUnitResponse:
    properties:
      data:
        $ref: '#/definitions/domain.GPUUnitRuntime'
    type: object
  api.HealthResponse:
    properties:
      data:
        $ref: '#/definitions/domain.HealthStatus'
    type: object
  api.InventoryResponse:
    properties:
      data:
        $ref: '#/definitions/domain.RuntimeInventoryStatus'
    type: object
  api.ServerlessInvocationResponse:
    properties:
      data:
        $ref: '#/definitions/domain.ServerlessInvocationAck'
    type: object
  contract.CreateGPUUnitRequest:
    properties:
      access:
        $ref: '#/definitions/v1alpha1.GPUUnitAccess'
      cpu:
        type: string
      gpu:
        type: integer
      image:
        type: string
      memory:
        type: string
      name:
        type: string
      operationID:
        type: string
      packageID:
        type: string
      serverless:
        $ref: '#/definitions/v1alpha1.GPUUnitServerlessSpec'
      specName:
        type: string
      ssh:
        $ref: '#/definitions/v1alpha1.GPUUnitSSHSpec'
      storageMounts:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitStorageMount'
        type: array
      template:
        $ref: '#/definitions/v1alpha1.GPUUnitTemplate'
    type: object
  contract.CreateServerlessInvocationRequest:
    properties:
      attributes:
        additionalProperties:
          type: string
        type: object
      contentType:
        type: string
      headers:
        additionalProperties:
          type: string
        type: object
      invocationID:
        type: string
      mode:
        $ref: '#/definitions/serverless.InvocationMode'
      payload:
        items:
          type: integer
        type: array
      serverlessRequestID:
        type: string
      timeoutSeconds:
        type: integer
    type: object
  contract.UpdateGPUUnitRequest:
    properties:
      access:
        $ref: '#/definitions/v1alpha1.GPUUnitAccess'
      image:
        type: string
      serverless:
        $ref: '#/definitions/v1alpha1.GPUUnitServerlessSpec'
      ssh:
        $ref: '#/definitions/v1alpha1.GPUUnitSSHSpec'
      storageMounts:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitStorageMount'
        type: array
      template:
        $ref: '#/definitions/v1alpha1.GPUUnitTemplate'
    type: object
  domain.GPUProductHealth:
    properties:
      allocatable:
        type: integer
      capacity:
        type: integer
      nodeCount:
        type: integer
      product:
        type: string
    type: object
  domain.GPUStorageRuntime:
    properties:
      accessor:
        $ref: '#/definitions/v1alpha1.GPUStorageAccessorSpec'
      accessorStatus:
        $ref: '#/definitions/v1alpha1.GPUStorageAccessorStatus'
      capacity:
        type: string
      claimName:
        type: string
      lastSyncTime:
        type: string
      message:
        type: string
      mountedBy:
        items:
          type: string
        type: array
      name:
        type: string
      namespace:
        type: string
      observedGeneration:
        type: integer
      phase:
        type: string
      prepare:
        $ref: '#/definitions/v1alpha1.GPUStoragePrepareSpec'
      prepareStatus:
        $ref: '#/definitions/v1alpha1.GPUStoragePrepareStatus'
      reason:
        type: string
      size:
        type: string
      storageClassName:
        type: string
    type: object
  domain.GPUUnitRuntime:
    properties:
      access:
        $ref: '#/definitions/v1alpha1.GPUUnitAccess'
      accessURL:
        type: string
      allocation:
        $ref: '#/definitions/v1alpha1.GPUUnitAllocationSpec'
      cpu:
        type: string
      draStatus:
        $ref: '#/definitions/v1alpha1.GPUUnitDRAStatus'
      gpu:
        type: integer
      image:
        type: string
      lastSyncTime:
        type: string
      lifecycle:
        type: string
      memory:
        type: string
      message:
        type: string
      name:
        type: string
      namespace:
        type: string
      observedGeneration:
        type: integer
      packageID:
        type: string
      phase:
        type: string
      readyReplicas:
        type: integer
      reason:
        type: string
      serverless:
        $ref: '#/definitions/v1alpha1.GPUUnitServerlessSpec'
      serverlessStatus:
        $ref: '#/definitions/v1alpha1.GPUUnitServerlessStatus'
      serviceName:
        type: string
      specName:
        type: string
      ssh:
        $ref: '#/definitions/v1alpha1.GPUUnitSSHSpec'
      sshStatus:
        $ref: '#/definitions/v1alpha1.GPUUnitSSHStatus'
      storageMounts:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitStorageMount'
        type: array
      template:
        $ref: '#/definitions/v1alpha1.GPUUnitTemplate'
    type: object
  domain.HealthStatus:
    properties:
      activeUnitCount:
        type: integer
      averageGpuUtilizationPercent:
        type: number
      freeGpuMemoryMiB:
        type: number
      gpuDeviceCount:
        type: integer
      gpuProducts:
        items:
          $ref: '#/definitions/domain.GPUProductHealth'
        type: array
      kubeError:
        type: string
      kubernetesConnected:
        type: boolean
      nodeCount:
        type: integer
      nvidiaMetricsConnected:
        type: boolean
      nvidiaMetricsError:
        type: string
      readyNodeCount:
        type: integer
      startedAt:
        type: string
      totalGPUAllocatable:
        type: integer
      totalGPUCapacity:
        type: integer
      totalGpuMemoryMiB:
        type: number
      uptimeSeconds:
        type: integer
      usedGpuMemoryMiB:
        type: number
    type: object
  domain.RuntimeDRADeviceStatus:
    properties:
      claimName:
        type: string
      consumedCapacity:
        additionalProperties:
          type: string
        type: object
      device:
        type: string
      driver:
        type: string
      namespace:
        type: string
      pool:
        type: string
      request:
        type: string
      shareID:
        type: string
    type: object
  domain.RuntimeInventoryStatus:
    properties:
      draAllocatedClaims:
        type: integer
      draAllocatedDevices:
        type: integer
      draClaimCount:
        type: integer
      draDevices:
        items:
          $ref: '#/definitions/domain.RuntimeDRADeviceStatus'
        type: array
      draResourceSlices:
        type: integer
      gpuProducts:
        items:
          $ref: '#/definitions/domain.GPUProductHealth'
        type: array
      kubernetesConnected:
        type: boolean
      nodeCount:
        type: integer
      readyNodeCount:
        type: integer
      resourceQuotas:
        items:
          $ref: '#/definitions/domain.RuntimeQuotaStatus'
        type: array
      totalGpuAllocatable:
        type: integer
      totalGpuCapacity:
        type: integer
    type: object
  domain.RuntimeQuotaStatus:
    properties:
      hard:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
      namespace:
        type: string
      used:
        additionalProperties:
          type: string
        type: object
    type: object
  domain.ServerlessInvocationAck:
    properties:
      acceptedAt:
        type: string
      duplicate:
        type: boolean
      invocationID:
        type: string
      metricsSubject:
        type: string
      mode:
        type: string
      resultSubject:
        type: string
      sequence:
        type: integer
      serverlessRequestID:
        type: string
      stream:
        type: string
      subject:
        type: string
    type: object
  serverless.InvocationMode:
    enum:
    - async
    - sync
    type: string
    x-enum-varnames:
    - InvocationModeAsync
    - InvocationModeSync
  service.CreateGPUStorageRequest:
    properties:
      accessor:
        $ref: '#/definitions/v1alpha1.GPUStorageAccessorSpec'
      name:
        type: string
      prepare:
        $ref: '#/definitions/v1alpha1.GPUStoragePrepareSpec'
      size:
        type: string
      storageClassName:
        type: string
    type: object
  service.UpdateGPUStorageRequest:
    properties:
      accessor:
        $ref: '#/definitions/v1alpha1.GPUStorageAccessorSpec'
      size:
        type: string
    type: object
  v1.Protocol:
    enum:
    - TCP
    - UDP
    - SCTP
    type: string
    x-enum-varnames:
    - ProtocolTCP
    - ProtocolUDP
    - ProtocolSCTP
  v1alpha1.GPUStorageAccessorSpec:
    properties:
      enabled:
        description: Enabled turns on the built-in storage accessor deployment and
          service.
        type: boolean
    type: object
  v1alpha1.GPUStorageAccessorStatus:
    properties:
      accessURL:
        type: string
      phase:
        type: string
      serviceName:
        type: string
    type: object
  v1alpha1.GPUStoragePrepareSpec:
    properties:
      args:
        description: Args overrides the container args used by the data preparation
          job.
        items:
          type: string
        type: array
      command:
        description: Command overrides the container command used by the data preparation
          job.
        items:
          type: string
        type: array
      fromImage:
        description: FromImage is the image used by the data preparation job.
        type: string
      fromStorageName:
        description: FromStorageName copies data from another storage object in the
          same namespace.
        type: string
    type: object
  v1alpha1.GPUStoragePrepareStatus:
    properties:
      jobName:
        type: string
      observedDigest:
        type: string
      phase:
        type: string
      recoveryPhase:
        type: string
    type: object
  v1alpha1.GPUUnitAccess:
    properties:
      primaryPort:
        type: string
      scheme:
        type: string
    type: object
  v1alpha1.GPUUnitAllocationSpec:
    properties:
      capacity:
        additionalProperties:
          type: string
        description: Capacity contains DRA consumable capacity requests per device,
          for example memory or cores.
        type: object
      claimName:
        description: ClaimName is the controller-owned DRA ResourceClaim name.
        type: string
      claimRequestName:
        description: ClaimRequestName is the request name inside the DRA ResourceClaim.
        type: string
      count:
        description: |-
          Count is the exact number of devices requested from the DeviceClass.
          +kubebuilder:validation:Minimum=0
        type: integer
      deviceClassName:
        description: DeviceClassName is the DRA DeviceClass used for package-backed
          allocation.
        type: string
      selectors:
        description: Selectors contains control-plane managed CEL selectors for DRA
          devices.
        items:
          type: string
        type: array
    type: object
  v1alpha1.GPUUnitDRADeviceStatus:
    properties:
      consumedCapacity:
        additionalProperties:
          type: string
        type: object
      device:
        type: string
      driver:
        type: string
      pool:
        type: string
      request:
        type: string
      shareID:
        type: string
    type: object
  v1alpha1.GPUUnitDRAStatus:
    properties:
      allocated:
        type: boolean
      claimName:
        type: string
      devices:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitDRADeviceStatus'
        type: array
    type: object
  v1alpha1.GPUUnitEnvVar:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  v1alpha1.GPUUnitPortSpec:
    properties:
      name:
        type: string
      port:
        description: |-
          +kubebuilder:validation:Minimum=1
          +kubebuilder:validation:Maximum=65535
        type: integer
      protocol:
        $ref: '#/definitions/v1.Protocol'
    type: object
  v1alpha1.GPUUnitSSHSpec:
    properties:
      authorizedKeys:
        items:
          type: string
        type: array
      clientDomain:
        type: string
      clientName:
        type: string
      connectHost:
        description: ConnectHost is the user-facing HTTP CONNECT proxy host used in
          the ready-to-run SSH command.
        type: string
      connectPort:
        description: |-
          +kubebuilder:validation:Minimum=1
          +kubebuilder:validation:Maximum=65535
        type: integer
      domainSuffix:
        description: DomainSuffix is combined with name + namespace when ClientDomain
          is omitted.
        type: string
      enabled:
        type: boolean
      frpImage:
        type: string
      image:
        type: string
      port:
        description: |-
          +kubebuilder:validation:Minimum=1
          +kubebuilder:validation:Maximum=65535
        type: integer
      serverAddr:
        description: ServerAddr is the FRP server address that the injected sidecar
          dials.
        type: string
      serverPort:
        description: |-
          +kubebuilder:validation:Minimum=1
          +kubebuilder:validation:Maximum=65535
        type: integer
      token:
        type: string
      username:
        type: string
    type: object
  v1alpha1.GPUUnitSSHStatus:
    properties:
      accessCommand:
        type: string
      connectHost:
        type: string
      connectPort:
        type: integer
      phase:
        type: string
      targetHost:
        type: string
      username:
        type: string
    type: object
  v1alpha1.GPUUnitServerlessFrameworkSpec:
    properties:
      healthPath:
        description: HealthPath is the local HTTP path polled over the unix domain
          socket before dispatch consumption starts.
        type: string
      invokePath:
        description: InvokePath is the local HTTP path received over the unix domain
          socket from the sidecar.
        type: string
      socketPath:
        description: SocketPath is the shared unix domain socket path used by the
          sidecar and framework containers.
        type: string
    type: object
  v1alpha1.GPUUnitServerlessSpec:
    properties:
      enabled:
        type: boolean
      framework:
        $ref: '#/definitions/v1alpha1.GPUUnitServerlessFrameworkSpec'
      idleTimeoutSeconds:
        description: +kubebuilder:validation:Minimum=0
        type: integer
      minAvailableCount:
        description: +kubebuilder:validation:Minimum=0
        type: integer
      minRequestCount:
        description: +kubebuilder:validation:Minimum=0
        type: integer
      requestID:
        description: RequestID is the control-plane generated serverless request identifier
          shared by queued invocations and worker pools.
        type: string
    type: object
  v1alpha1.GPUUnitServerlessStatus:
    properties:
      dispatchSubject:
        type: string
      healthPath:
        type: string
      invokePath:
        type: string
      phase:
        type: string
      socketPath:
        type: string
    type: object
  v1alpha1.GPUUnitStorageMount:
    properties:
      mountPath:
        type: string
      name:
        type: string
      readOnly:
        type: boolean
    type: object
  v1alpha1.GPUUnitTemplate:
    properties:
      args:
        items:
          type: string
        type: array
      command:
        items:
          type: string
        type: array
      envs:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitEnvVar'
        type: array
      ports:
        items:
          $ref: '#/definitions/v1alpha1.GPUUnitPortSpec'
        type: array
    type: object
info:
  contact:
    name: API Support
  description: Control-plane API for the GPU operator runtime tutorial project.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: GPU Operator Runtime API
  version: "1.0"
paths:
  /gpu-storages:
    get:
      description: List RBD-backed GPU storage resources in the shared runtime instance
        namespace, including prepare-job and accessor status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUStorageListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List GPU storages
      tags:
      - storage
    post:
      consumes:
      - application/json
      description: Persist a GPUStorage resource. By default it targets the rook-ceph-block
        RBD StorageClass, and the controller reconciles the backing PersistentVolumeClaim,
        prepare job, and optional accessor asynchronously.
      parameters:
      - description: Create GPU storage request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.CreateGPUStorageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.GPUStorageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create a GPU storage
      tags:
      - storage
  /gpu-storages/{name}:
    delete:
      description: Delete a GPUStorage resource after verifying that no active GPU
        unit still mounts it.
      parameters:
      - description: GPU storage name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Delete a GPU storage
      tags:
      - storage
    get:
      description: Get the desired and observed state of one GPUStorage resource.
      parameters:
      - description: GPU storage name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUStorageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get a GPU storage
      tags:
      - storage
    put:
      consumes:
      - application/json
      description: Update the mutable storage fields on a GPUStorage resource. This
        chapter allows storage expansion and accessor toggling, while prepare workflows
        stay immutable and recoverable through a dedicated action.
      parameters:
      - description: GPU storage name
        in: path
        name: name
        required: true
        type: string
      - description: Update GPU storage request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateGPUStorageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUStorageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update a GPU storage
      tags:
      - storage
  /gpu-storages/{name}/recover:
    post:
      description: Request a new prepare attempt for one GPUStorage resource after
        a failed data job.
      parameters:
      - description: GPU storage name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUStorageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Recover a GPU storage
      tags:
      - storage
  /gpu-units:
    get:
      description: List active GPU unit resources in the fixed runtime instance namespace.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List GPU units
      tags:
      - runtime
    post:
      consumes:
      - application/json
      description: Persist an active DRA-backed GPUUnit from a configured packageID,
        runtime image, template, access settings, and storage mounts. Replays with
        the same operationID and payload are idempotent.
      parameters:
      - description: Create GPU unit request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/contract.CreateGPUUnitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create a GPU unit
      tags:
      - runtime
  /gpu-units/{name}:
    delete:
      description: Delete an active GPU unit resource and let Kubernetes garbage collection
        clean up the owned runtime objects.
      parameters:
      - description: GPU unit name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Delete a GPU unit
      tags:
      - runtime
    get:
      description: Get the current desired and observed state of one active GPU unit.
      parameters:
      - description: GPU unit name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get a GPU unit
      tags:
      - runtime
    put:
      consumes:
      - application/json
      description: Update the mutable runtime contract of an active GPU unit, including
        image, template, access settings, and storage mounts.
      parameters:
      - description: GPU unit name
        in: path
        name: name
        required: true
        type: string
      - description: Update GPU unit request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/contract.UpdateGPUUnitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GPUUnitResponse'
        "400":
          description: Bad Request
          schema:
