apiVersion: runtime.lokiwager.io/v1alpha1
kind: GPUUnit
metadata:
  labels:
    app.kubernetes.io/name: gpu-operator-runtime
    app.kubernetes.io/managed-by: kustomize
  name: demo-instance
  namespace: runtime-instance
spec:
  specName: g1.1
  image: python:3.12
  memory: 16Gi
  gpu: 1
  access:
    primaryPort: http
    scheme: http
  ssh:
    enabled: true
    username: runtime
    serverAddr: ssh-proxy.example.com
    serverPort: 7000
    connectHost: ssh-proxy.example.com
    connectPort: 1337
    domainSuffix: ssh.example.com
    authorizedKeys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA== demo@example
  template:
    command:
      - python
    args:
      - -m
      - http.server
      - "8080"
    envs:
      - name: MODEL_ID
        value: sd-webui
    ports:
      - name: http
        port: 8080
  storageMounts:
    - name: model-cache
      mountPath: /workspace/cache
